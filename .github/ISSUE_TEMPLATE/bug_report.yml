name: Bug report
description: Report a bug with reproduction steps and expected behavior.
title: "[Bug]: "
labels: ["Feature Bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the problem.
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the shortest reliable path to reproduce the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happens instead?
    validations:
      required: true
